poller:
  replicaCount: 3
  appSettings:
    buffers:
      closing: 60
    poller:
      pollee:
        version: '1.19.0'
enricher:
  replicaCount: 1
reserver:
  replicaCount: 7
  appSettings:
    buffers:
      closing: 60
    stream:
      reserver: buyqueue

buyer:
  appSettings:
    buyer:
      sleepBuffer: 1
    stream:
      reserver: buyqueue

# withdrawer parked until Airwallex PayNow payouts (Beta) are enabled on the
# account: the nightly approve sweep would only bounce every Pending
# withdrawal off the gateway. Re-enable by deleting this block.
withdrawer:
  enabled: false
