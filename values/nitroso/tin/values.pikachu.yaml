enricher:
  appSettings:
    enricher:
      email: ernest@bunnybooker.com
poller:
  replicaCount: 0
  appSettings:
    poller:
      pollee:
        version: '1.19.0'
# --- epoch prober DRY-RUN validation (Phase 0, EPOCH-PROBER.md §9) ---
# spawner ticks every minute and spawns tin-prober-<epoch>-<shard>-<fanout>
# Jobs that probe KTMB Reserve on the enricher account, log polls/holds
# tallies, and CANCEL every hold immediately (dryRun) — no ReserveDto is
# enqueued, no money moves. The legacy reserver/buyer are scaled to 0 for
# the money-leak isolation the PR #41 review demanded (a cancelled hold
# re-appearing as availability must not trigger a legacy buy).
# REVERT = spawner.enabled false + restore reserver/buyer replicas.
#
# SCALING TEST (was 250m/128Mi): both the spawner (which does enrichment)
# and the spawned prober Jobs bumped to 1 CPU / 1Gi, requests==limits
# (Guaranteed QoS, integer CPU => CPU-pinning-eligible; true core-pinning
# still needs the node kubelet cpu-manager-policy=static, currently 'none').
spawner:
  enabled: true
  resources:
    requests:
      cpu: '1'
      memory: '1Gi'
    limits:
      cpu: '1'
      memory: '1Gi'
  appSettings:
    prober:
      dryRun: true
      jobCpu: '1'
      jobMemory: '1Gi'
reserver:
  replicaCount: 0
buyer:
  replicaCount: 0
